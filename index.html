<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生命数字能量测算平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #F7F5F2 0%, #E8E4DF 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .logo {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #B8C8D8 0%, #A89BBF 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(184, 200, 216, 0.3);
        }
        .logo span {
            color: white;
            font-size: 48px;
            font-weight: 300;
        }
        h1 {
            color: #333;
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 10px;
            letter-spacing: 4px;
        }
        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 300px;
        }
        .btn {
            padding: 18px 30px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }
        .btn-free {
            background: linear-gradient(135deg, #B8C8D8 0%, #9CB8D4 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(184, 200, 216, 0.4);
        }
        .btn-free:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(184, 200, 216, 0.5);
        }
        .btn-premium {
            background: linear-gradient(135deg, #A89BBF 0%, #8B7CAE 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(168, 155, 191, 0.4);
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(168, 155, 191, 0.5);
        }
        .footer {
            position: absolute;
            bottom: 30px;
            color: #aaa;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="logo">
        <span>命</span>
    </div>
    <h1>生命数字能量</h1>
    <p class="subtitle">探索你的生命密码</p>
    
    <div class="buttons">
        <button class="btn btn-free" onclick="location.href='生命数字能量_免费版.html'">
            免费版
        </button>
        <button class="btn btn-premium" onclick="location.href='生命数字能量_完整付费版.html'">
            完整付费版
        </button>
    </div>
    
    <p class="footer">© 2024 生命数字能量测算平台</p>
</body>
</html>
